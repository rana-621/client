<div class="container-fluid py-4">
  <h2 class="main-title"> Ecommerce </h2>
  <div class="row">
    <!-- Sidebar -->
    <aside class="col-lg-3 mb-4">
      <div class="sidebar">
        <h4 class="section-title">Sort By</h4>
        <select class="form-select mb-4">
          <option>Name</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
        </select>
        <h4 class="section-title">Categories</h4>
        <ul class="list-group custom-list-group">
          <li class="list-group-item custom-list-item active">Laptop</li>
          <li class="list-group-item custom-list-item">Mobile</li>
          <li class="list-group-item custom-list-item">Watch</li>
          <li class="list-group-item custom-list-item">Headphones</li>
          <li class="list-group-item custom-list-item">Camera</li>
        </ul>
      </div>
    </aside>


    <section class="col-lg-9">
      <div class="top-bar">
        <div class="results-count">
          Showing <strong>6</strong> Products
        </div>
        <div class="input-group search-bar">
          <input
            type="text"
            class="form-control"
            placeholder="Search products..."
          >
          <button class="btn btn-danger">Search</button>
          <button class="btn btn-dark">Reset</button>
        </div>
      </div>

      <div class="row g-4">
      <!-- Dynamic Products from Angular -->
        @for(item of products; track $index){ 
          <ng-container>
            <app-shop-item [product]="item"></app-shop-item>
          </ng-container>
        }
        </div>
    
    </section>
  </div>
</div>
